services:
  # ── Backend (FastAPI + AI Models) ────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: livedetect-backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_CONFIG_PATH=/app/configs/production.yaml
    volumes:
      - ./data:/app/data              # Persist DB, snapshots, clips
      - ./models:/app/models          # Model weights
    ports:
      - "8000:8000"                   # Direct backend access (dev)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ── Frontend (React + Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: livedetect-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"                   # Direct frontend access (dev)
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: livedetect-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  data:
